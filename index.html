<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>米蕉团购下单</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #667085;
      --line: #e6e8ec;
      --bg: #f6f7f4;
      --paper: #ffffff;
      --accent: #178a55;
      --accent-dark: #0f6e43;
      --gold: #f2c94c;
      --soft: #fff8d9;
      --danger: #b42318;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .hero {
      min-height: 210px;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(20, 70, 40, .86), rgba(20, 70, 40, .40)),
        url("https://images.unsplash.com/photo-1528825871115-3581a5387919?auto=format&fit=crop&w=1400&q=80");
      background-size: cover;
      background-position: center;
      color: #fff;
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .hero p {
      margin: 0;
      max-width: 440px;
      font-size: 15px;
      line-height: 1.55;
    }

    .notice {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #f0df9a;
      border-radius: 8px;
      background: var(--soft);
      font-size: 14px;
      line-height: 1.55;
    }

    section {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    label.option {
      display: block;
      min-height: 84px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      background: #fff;
    }

    label.option:has(input:checked) {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
      background: #f2fbf6;
    }

    .option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option strong {
      display: block;
      margin-bottom: 4px;
      font-size: 17px;
    }

    .option span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .field {
      margin-top: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #344054;
    }

    input[type="text"],
    input[type="tel"],
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
      background: #f3f7f4;
      font-size: 15px;
    }

    .summary strong {
      font-size: 22px;
      color: var(--accent-dark);
    }

    .live-showcase {
      overflow: hidden;
      padding: 0;
    }

    .live-copy {
      padding: 14px 14px 10px;
    }

    .live-copy h2 {
      margin-bottom: 6px;
    }

    .live-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .live-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .live-grid img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 132px;
      object-fit: cover;
      border-radius: 8px;
      background: #f3f4f6;
    }

    .live-main {
      aspect-ratio: 3 / 4;
    }

    .live-side {
      display: grid;
      gap: 8px;
    }

    .live-side img {
      aspect-ratio: 1 / 1;
    }

    .pay-code {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7f9fb;
      text-align: center;
    }

    .pay-code[hidden] {
      display: none;
    }

    .pay-code strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .pay-code img {
      display: block;
      width: min(100%, 300px);
      margin: 0 auto;
      border-radius: 8px;
      background: #fff;
    }

    .actions {
      position: sticky;
      bottom: 0;
      z-index: 2;
      margin: 14px -14px -28px;
      padding: 12px 14px 16px;
      border-top: 1px solid var(--line);
      background: rgba(246, 247, 244, .96);
      backdrop-filter: blur(8px);
      display: grid;
      gap: 10px;
    }

    button,
    a.button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:active {
      background: var(--accent-dark);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .seller {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f7f9fb;
      font-size: 14px;
    }

    .seller strong {
      display: block;
      margin-bottom: 2px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 84px;
      transform: translateX(-50%);
      max-width: calc(100% - 28px);
      padding: 10px 14px;
      border-radius: 8px;
      background: #101828;
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 520px) {
      .options,
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 27px;
      }

      .live-grid {
        grid-template-columns: 1fr;
      }

      .live-main {
        aspect-ratio: 4 / 5;
      }

      .live-side {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>

      </div>
      <div class="field">
        <label for="paymentStatus">付款状态</label>
        <select id="paymentStatus">
          <option>未付款</option>
          <option>已付款，已截图发老板</option>
          <option>到货付款</option>
        </select>
      </div>
      <p class="hint">付款前请先复制订单发给老板确认，避免缺货或自提时间变动。</p>
    </section>

    <section>
      <h2>自提说明</h2>
      <p class="hint">默认小区门口自提。满10份成团，截单后统一通知自提时间。水果自然成熟有差异，坏果请当天拍照反馈。</p>
      <div class="seller">
        <div>
          <strong>团购老板微信</strong>
          <span id="sellerWechat">15259260511</span>
        </div>
        <span>先复制订单，再发微信</span>
      </div>
    </section>

    <div class="actions">
      <button class="primary" id="copyOrder">复制下单信息</button>
      <button class="secondary" id="previewOrder">查看订单内容</button>
    </div>
  </main>

  <div class="toast" id="toast">已复制，去微信发给老板即可</div>

  <script>
    const productInputs = [...document.querySelectorAll('input[name="product"]')];
    const paymentInputs = [...document.querySelectorAll('input[name="payment"]')];
    const qty = document.querySelector('#qty');
    const ripeness = document.querySelector('#ripeness');
    const paymentStatus = document.querySelector('#paymentStatus');
    const total = document.querySelector('#total');
    const wechatPayCode = document.querySelector('#wechatPayCode');
    const fields = ['name', 'phone', 'community', 'address', 'note']
      .reduce((acc, id) => ({ ...acc, [id]: document.querySelector(`#${id}`) }), {});
    const toast = document.querySelector('#toast');

    function selectedProduct() {
      const input = productInputs.find(item => item.checked);
      const [price, jin, label] = input.value.split('|');
      return { price: Number(price), jin: Number(jin), label };
    }

    function selectedPayment() {
      return paymentInputs.find(item => item.checked).value;
    }

    function money(value) {
      return Number.isInteger(value) ? `${value}元` : `${value.toFixed(1)}元`;
    }

    function updateTotal() {
      const product = selectedProduct();
      total.textContent = money(product.price * Number(qty.value));
    }

    function updatePaymentCode() {
      wechatPayCode.hidden = selectedPayment() !== '微信支付';
    }

    function buildOrderText() {
      const product = selectedProduct();
      const count = Number(qty.value);
      const amount = product.price * count;
      const totalJin = product.jin * count;
      return [
        '米蕉团购下单',
        `规格：${product.label}`,
        `份数：${count}份，共约${totalJin}斤`,
        `金额：${money(amount)}`,
        `支付方式：${selectedPayment()}`,
        `付款状态：${paymentStatus.value}`,
        `熟度：${ripeness.value}`,
        `姓名：${fields.name.value || '未填写'}`,
        `电话：${fields.phone.value || '未填写'}`,
        `小区/园区：${fields.community.value || '未填写'}`,
        `楼栋/自提备注：${fields.address.value || '未填写'}`,
        `其他备注：${fields.note.value || '无'}`
      ].join('\n');
    }

    async function copyOrder() {
      const text = buildOrderText();
      try {
        await navigator.clipboard.writeText(text);
        showToast('已复制，去微信发给老板即可');
      } catch (error) {
        window.prompt('复制这段内容发给老板微信：', text);
      }
    }

    function previewOrder() {
      window.alert(buildOrderText());
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      window.setTimeout(() => toast.classList.remove('show'), 1800);
    }

    productInputs.forEach(input => input.addEventListener('change', updateTotal));
    paymentInputs.forEach(input => input.addEventListener('change', updatePaymentCode));
    qty.addEventListener('change', updateTotal);
    document.querySelector('#copyOrder').addEventListener('click', copyOrder);
    document.querySelector('#previewOrder').addEventListener('click', previewOrder);
    updateTotal();
    updatePaymentCode();
  </script>
</body>
